<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="../src/output.css">

    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body class="bg-[#f3f4f6] min-h-screen flex items-center justify-center font-sans px-4">

    <!-- REGISTER CARD -->
    <div
        class="w-full max-w-4xl h-[700px] bg-white rounded-[26px] overflow-hidden shadow-[0_10px_40px_rgba(0,0,0,0.08)] grid lg:grid-cols-2">

        <!-- LEFT -->
        <div class="relative hidden lg:block">

            <img src="../asset/canten.jpg"
                class="w-full h-full object-cover">

            <!-- OVERLAY -->
            <div class="absolute inset-0 bg-black/50"></div>

            <!-- BACK -->
            <button onclick="window.location.href='login.html'"
                class="absolute top-6 left-6 z-20 w-9 h-9 rounded-full bg-white flex items-center justify-center hover:scale-105 transition">

                <i data-feather="chevron-left" class="w-4 h-4 text-black"></i>

            </button>
        </div>

        <!-- RIGHT -->
        <div class="flex items-center justify-center px-8 py-8">

            <div class="w-full max-w-sm">

                <!-- TOP -->
                <div class="flex justify-end mb-7">

                    <a href="./login.html"
                        class="bg-blue-600 text-white px-5 py-2 rounded-full text-xs font-medium hover:bg-gray-800 transition">
                        Sign in
                    </a>

                </div>

                <!-- TITLE -->
                <div class="mb-7">

                    <h1 class="text-3xl font-bold text-orange-500 mb-1">
                        Create Account
                    </h1>

                    <p class="text-black-400 text-sm">
                        Register your account
                    </p>

                </div>

                <!-- FORM -->
                <form id="registerForm" class="space-y-2 -mt-2">

                    <!-- USERNAME -->
                    <div>

                        <label class="block text-sm font-medium text-black-400 mb-2">
                            Username
                        </label>

                        <input type="text" id="username" placeholder="userexample99"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#1b2569] transition">
                    </div>

                    <!-- EMAIL -->
                    <div>

                        <label class="block text-sm font-medium text-black-400 mb-2">
                           Your Email
                        </label>

                        <input type="email" id="email" placeholder="example123@gmail.com"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#1b2569] transition">

                    </div>

                    <!-- PASSWORD -->
                    <div>

                        <label class="block text-sm font-medium text-black-400 mb-3">
                            Your Password
                        </label>

                        <div class="relative">

                            <input type="password" id="password" placeholder="example123"
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#1b2569] transition">

                            <button type="button" id="toggle-password"
                                class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">

                                <i data-feather="eye" class="w-4 h-4"></i>

                            </button>

                        </div>

                    </div>

                    <!-- BUTTON -->
                    <button type="submit"
                        class="w-full bg-orange-400 text-white py-3 rounded-xl text-sm font-semibold hover:bg-[#1b2569] transition duration-300 mt-3">

                        Register

                    </button>

                </form>

                <div class="flex items-center mt-2 text-sm">
  <label class="flex items-center gap-2 cursor-pointer text-gray-600">
    <input 
      type="checkbox" 
      id="registerRememberMe"
      class="w-4 h-4 accent-blue-500 rounded"
    />
    <span>Remember me</span>
  </label>
</div>

                <!-- LINE -->
                <div class="flex items-center gap-3 my-6">

                    <div class="flex-1 h-px bg-gray-200"></div>

                    <p class="text-xs text-black-400">
                        Register With
                    </p>

                    <div class="flex-1 h-px bg-gray-200"></div>

                </div>

                <!-- SOCIAL -->
                <div class="grid grid-cols-2 gap-3">

                    <!-- GOOGLE -->
                    <button
                        class="border border-gray-200 rounded-xl py-3 flex items-center justify-center gap-2 hover:bg-gray-50 transition">

                        <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" class="w-4 h-4">

                        <span class="text-sm font-medium text-gray-700">
                            Google
                        </span>

                    </button>

                    <!-- FACEBOOK -->
                    <button
                        class="border border-gray-200 rounded-xl py-3 flex items-center justify-center gap-2 hover:bg-gray-50 transition">

                        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" class="w-4 h-4">

                        <span class="text-sm font-medium text-gray-700">
                            Facebook
                        </span>

                    </button>

                </div>

                <!-- LOGIN -->
                <p class="text-center text-sm text-black-500 mt-7">

                    Already have an account?

                    <a href="login.html" class="text-blue-600 font-medium hover:underline">
                        Login
                    </a>

                </p>

            </div>

        </div>

    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed top-5 right-5 translate-x-[150%] transition-all duration-500 z-50">

        <div id="toast-content" class="px-5 py-3 rounded-xl text-white text-sm font-medium shadow-lg">

            Notifikasi

        </div>

    </div>

    <script src="../script/register.js"></script>

    <script>
        feather.replace();
    </script>

</body>

</html>
